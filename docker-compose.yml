services:
  postgres:
    image: postgres:17
    container_name: chat-app-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat_app_dev
    ports:
      - "5432:5432"
    volumes:
      - chat-app-postgres-data:/var/lib/postgresql/data

volumes:
  chat-app-postgres-data:
